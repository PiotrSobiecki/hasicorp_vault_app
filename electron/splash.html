<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0d1117;
        color: #ffffff;
        font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }

      /* Blue glow in background */
      .glow {
        position: absolute;
        width: 300px;
        height: 300px;
        background: radial-gradient(
          circle,
          rgba(26, 111, 255, 0.18) 0%,
          transparent 70%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -65%);
        pointer-events: none;
      }

      /* Logo */
      .logo {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #1a6fff, #0f4ed4);
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 40px rgba(26, 111, 255, 0.5);
        margin-bottom: 22px;
        animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      .logo svg {
        display: block;
      }

      @keyframes popIn {
        from {
          transform: scale(0.5);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .title {
        font-size: 22px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -0.4px;
        animation: fadeUp 0.4s 0.2s ease both;
      }

      .subtitle {
        font-size: 12px;
        color: #8b949e;
        margin-top: 5px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        animation: fadeUp 0.4s 0.3s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Loading spinner */
      .spinner-area {
        margin-top: 36px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        animation: fadeUp 0.4s 0.4s ease both;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(26, 111, 255, 0.25);
        border-top-color: #1a6fff;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 13px;
        color: #6e7681;
        animation: blink 1.8s ease-in-out infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }

      .version {
        position: absolute;
        bottom: 16px;
        right: 18px;
        font-size: 11px;
        color: #30363d;
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>

    <div class="logo">
      <svg
        width="38"
        height="38"
        viewBox="0 0 24 24"
        fill="none"
        stroke="white"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect x="3" y="11" width="18" height="11" rx="2" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </svg>
    </div>

    <div class="title">Vault Manager</div>
    <div class="subtitle">HashiCorp Vault</div>

    <div class="spinner-area" id="loading">
      <div class="spinner"></div>
      <div class="loading-text" id="status-text">Starting application…</div>
    </div>

    <!-- Error panel (hidden by default) -->
    <div
      id="error-box"
      style="
        display: none;
        margin-top: 28px;
        background: rgba(240, 80, 80, 0.1);
        border: 1px solid rgba(240, 80, 80, 0.3);
        border-radius: 10px;
        padding: 14px 18px;
        max-width: 300px;
        text-align: center;
      "
    >
      <div style="font-size: 22px; margin-bottom: 8px">⚠️</div>
      <div
        id="error-title"
        style="
          font-size: 14px;
          font-weight: 600;
          color: #f05050;
          margin-bottom: 6px;
        "
      >
        Startup failed
      </div>
      <div
        id="error-msg"
        style="font-size: 12px; color: #8b949e; line-height: 1.5"
      ></div>
      <div style="margin-top: 12px; font-size: 11px; color: #4a5168">
        The window will close automatically in <span id="countdown">5</span>s
        </div>
    </div>

    <div class="version">v1.0</div>

    <script>
      // Called from main.js via executeJavaScript()
      function setStatus(text) {
        document.getElementById("status-text").textContent = text;
      }

      function showError(title, message) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error-title").textContent = title;
        document.getElementById("error-msg").textContent = message;
        document.getElementById("error-box").style.display = "block";
        let n = 5;
        const el = document.getElementById("countdown");
        setInterval(() => {
          if (n > 0) el.textContent = --n;
        }, 1000);
      }
    </script>
  </body>
</html>
